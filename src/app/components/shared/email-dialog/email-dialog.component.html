<p-toolbar>
  <button
    pButton
    icon="pi pi-back"
    (click)="back()"
    label="Abbruch"
    class="p-button-secondary p-button-outlined"
  ></button>
  <button
    pButton
    icon="pi pi-send"
    (click)="submit()"
    label="Senden"
    cass="p-button-primary p-button-outlined"
  ></button>
</p-toolbar>
<div class="card">
  @if (loading()) {
    <div class="progress-spinner">
      <p-progressSpinner></p-progressSpinner>
    </div>
  }
  <div class="mb-4 flex flex-wrap">
    <label for="to" class="w-full md:w-1/6 md:mb-0">TO:</label>
    <div class="w-full md:w-10/12">
      <textarea
        id="to"
        rows="1"
        cols="30"
        pTextarea
        [(ngModel)]="emailBody.email_an"
        class="text-base text-color border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"
      ></textarea>
    </div>
  </div>
  <div class="mb-4 flex flex-wrap">
    <label for="cc" class="w-full md:w-1/6 md:mb-0">CC:</label>
    <div class="w-full md:w-10/12">
      <textarea
        rows="1"
        cols="30"
        pTextarea
        id="cc"
        [(ngModel)]="emailBody.email_cc"
        name="cc"
        class="text-base text-color border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"
      ></textarea>
    </div>
  </div>
  <div class="mb-4 flex flex-wrap">
    <label for="bbc" class="w-full md:w-1/6 md:mb-0">BBC:</label>
    <div class="w-full md:w-10/12">
      <textarea
        rows="1"
        cols="30"
        pTextarea
        id="bbc"
        [(ngModel)]="emailBody.email_bcc"
        name="bcc"
        class="text-base text-color border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"
      ></textarea>
    </div>
  </div>
  <div class="mb-4 flex flex-wrap">
    <label for="from" class="w-full md:w-1/6 md:mb-0">Absender:</label>
    <div class="w-full md:w-10/12">
      <p-select
        [options]="lstSignature()"
        id="from"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="emailBody.email_signature"
        name="from"
        [required]="true"
      >
      </p-select>
    </div>
  </div>
  <div class="mb-4 flex flex-wrap">
    <label for="subject" class="w-full md:w-1/6 md:mb-0">Subject:</label>
    <div class="w-full md:w-10/12">
      <input
        id="subject"
        [(ngModel)]="emailBody.email_subject"
        name="subject"
        [required]="true"
        class="p-2 text-base text-color border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"
      />
    </div>
  </div>
  <div class="mb-4 flex flex-wrap">
    <div class="w-full md:w-full">
      <p-editor
        [(ngModel)]="emailBody.email_body"
        [disabled]="false"
        [placeholder]="'Hier kommt die Meldung'"
        name="body"
        [modules]="modules"
        [style]="{ height: '150px' }"
        class=""
      >
        <ng-template pTemplate="header"></ng-template>
      </p-editor>
    </div>
  </div>
  <div class="card">
    <div class="mb-4 flex flex-wrap">
      <label for="uploadfiles" class="w-full md:w-1/6 md:mb-0">Anhänge:</label>
      <div class="w-full md:w-10/12">
        <p-fileUpload
          id="uploadfiles"
          name="uploadfiles[]"
          [multiple]="true"
          [maxFileSize]="500 * 1024 * 1024"
          [auto]="true"
          chooseLabel="Wählen"
          [showCancelButton]="false"
          [showUploadButton]="false"
          accept="application/pdf"
          [customUpload]="true"
          (uploadHandler)="prepareFiles($any($event).files)"
        >
          <ng-template pTemplate="file">
            @for (file of uploadFiles(); track file; let ind = $index) {
              <div class="p-fileupload-row ng-star-inserted">
                <div class="p-fileupload-filename">{{ file.name }}</div>
                <div>{{ file.size }}</div>
                <div>
                  <button
                    type="button"
                    icon="pi pi-times"
                    pbutton=""
                    (click)="removeUploadFile(ind)"
                    class="p-element p-button p-component p-button-icon-only"
                    ng-reflect-icon="pi pi-times"
                  >
                    <span
                      class="p-button-icon pi pi-times"
                      aria-hidden="true"
                    ></span>
                  </button>
                </div>
              </div>
            }
          </ng-template>
        </p-fileUpload>
      </div>
    </div>
  </div>
</div>
