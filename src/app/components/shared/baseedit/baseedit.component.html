<p-scrollPanel [style]="{ width: '100%', height: '100%' }">
  @for (fld of editFields(); track fld; let ind = $index) {
    <span class="p-float-label">
      <label [for]="'float-input_' + ind">{{ fld.label }}</label>
      <input
        type="text"
        ngSwitch="fld.format == 'text'"
        [id]="'float-input_' + ind"
        pInputText
        />
      <p-inputNumber
        ngSwitch="fld.format == 'numeric'"
        [id]="'float-input_' + ind"
      ></p-inputNumber>
      <p-datepicker
        ngSwitch="fld.format == 'numeric'"
        [id]="'float-input_' + ind"
      ></p-datepicker>
    </span>
  }
  <p-toolbar>
    @for (but of editToolbar(); track but; let ind = $index) {
      <button
        pButton
        [label]="but.label!"
        [icon]="but.icon!"
        [ngClass]="but.btnClass!"
        (click)="clickOnToolbar(ind)"
      ></button>
    }
  </p-toolbar>
</p-scrollPanel>
