<div class="flex justify-end mt-3">
  <p-button
    label="Schliessen"
    icon="pi pi-times"
    severity="secondary"
    (onClick)="ref.close()"
  />
</div>
@if (pdfFile()) {
  <div>
    <object
      [data]="pdfFile()"
      type="application/pdf"
      width="100%"
      height="600px"
    >
      <p>
        Your browser does not support PDFs.
        <a [href]="pdfFile()">Download the PDF</a>.
      </p>
    </object>
  </div>
}
