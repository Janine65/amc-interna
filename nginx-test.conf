server {
  listen 4200;
  port_in_redirect off;
  root /usr/share/nginx/html;

  # Docker's embedded DNS, damit Service-Namen pro Request aufgelöst werden
  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    try_files $uri $uri/ $uri$args $uri$args /index.html =404;
  }

  location /amcbackend/ {
    proxy_hide_header Access-Control-Allow-Origin;
    if ($request_method ~* "(GET|POST|PUT|DELETE)") {
      add_header "Access-Control-Allow-Origin" $http_origin always;
      add_header "Access-Control-Allow-Credentials" true always;
    }
    if ($request_method = "OPTIONS") {
      add_header "Access-Control-Allow-Origin" $http_origin always;
      add_header "Access-Control-Allow-Methods" "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header "Access-Control-Allow-Headers" "Content-Type, Authorization" always;
      add_header "Access-Control-Allow-Credentials" true always;
      add_header "Content-Length" 0;
      return 204;
    }

    proxy_max_temp_file_size 0m;

    # Upstream als Variable => nginx löst pro Request via Docker-DNS auf
    set $amcbackend_upstream http://amcbackend:3001;

    # Bei proxy_pass mit Variable strippt nginx den Prefix NICHT automatisch.
    # Daher /amcbackend bzw. /amcbackend/ explizit entfernen.
    rewrite ^/amcbackend/?(.*)$ /$1 break;

    proxy_pass $amcbackend_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  sendfile on;
  client_max_body_size 20M;
  default_type application/json;

}
